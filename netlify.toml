# Netlify — Site-Root liegt im Unterordner landing/. Base-Directory in Netlify LEER lassen.
# Landing unter bewerbung.structifai.de, generierte Seiten unter /b/*.

[build]
  publish = "landing"

# /b/<slug> rendert die SPA build.html (Live-Build + statische Ansicht). build.html
# liest den Slug aus dem Pfad und holt die Daten aus dem öffentlichen sites-Bucket.
[[redirects]]
  from = "/b/*"
  to = "/build.html"
  status = 200

# Landing auch unter /bewerbung erreichbar.
[[redirects]]
  from = "/bewerbung"
  to = "/index.html"
  status = 200

# CSP + Hardening auf die Build-Ansicht (build.html setzt zusätzlich eine eigene CSP-Meta).
[[headers]]
  for = "/b/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https://qpxoggvbkbjluxkorgrp.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://qpxoggvbkbjluxkorgrp.supabase.co wss://qpxoggvbkbjluxkorgrp.supabase.co; base-uri 'none'; form-action 'none'"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
